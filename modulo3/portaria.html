<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestAI — Portaria (M3)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="m3-shared.css">

    <style>
        .badge-pendente        { background:#F1F5F9;color:#64748b; }
        .badge-convite_enviado { background:#FEF9C3;color:#854D0E; }
        .badge-confirmado      { background:#DCFCE7;color:#16a34a; }
        .badge-recusado        { background:#FFECE4;color:#FF5807; }
        .badge-lista_enviada   { background:#E3E8FF;color:#1547FF; }
        .badge-concluido       { background:#1547FF;color:white; }

        .portaria-meta {
            display:flex; gap:1.5rem; flex-wrap:wrap;
            font-size:0.875rem; color:var(--text-secondary);
            margin-top:0.75rem;
        }
        .portaria-meta-item {
            display:flex; align-items:center; gap:0.4rem;
        }

        .result-card {
            background:white;
            border:1px solid var(--border-light);
            border-radius:var(--radius-md);
            padding:1.1rem 1.25rem;
            margin-bottom:1rem;
            transition:box-shadow 0.15s;
        }
        .result-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.07); }
    </style>
</head>
<body>
    <main class="main-content">
        <!-- Back -->
        <div style="margin-bottom:1.5rem;">
            <a id="btn-voltar" href="eventos.html" class="btn-secondary"
               style="text-decoration:none;display:inline-flex;align-items:center;gap:0.5rem;padding:0.45rem 1rem;font-size:0.85rem;">
                <i data-lucide="arrow-left" style="width:15px;"></i> Voltar
            </a>
        </div>

        <!-- Page body -->
        <div id="page-body" style="display:none;">
            <!-- Event header -->
            <div class="glass-card" style="margin-bottom:1.5rem;">
                <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;">
                    <i data-lucide="door-open" style="width:22px;color:#1547FF;flex-shrink:0;"></i>
                    <div>
                        <div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#94a3b8;">Portaria</div>
                        <div id="ev-titulo" style="font-size:1.3rem;font-weight:800;color:var(--text-primary);line-height:1.2;"></div>
                    </div>
                </div>
                <div class="portaria-meta">
                    <div class="portaria-meta-item">
                        <i data-lucide="map-pin" style="width:14px;color:#94a3b8;"></i>
                        <span id="ev-local"></span>
                    </div>
                    <div class="portaria-meta-item">
                        <i data-lucide="calendar" style="width:14px;color:#94a3b8;"></i>
                        <span id="ev-data"></span>
                    </div>
                    <div class="portaria-meta-item">
                        <i data-lucide="ticket" style="width:14px;color:#94a3b8;"></i>
                        <span id="ev-cotas"></span>
                    </div>
                </div>
            </div>

            <!-- Busca -->
            <div class="glass-card" style="margin-bottom:1.5rem;">
                <div style="font-weight:700;font-size:1rem;color:var(--text-primary);margin-bottom:1rem;">
                    Buscar Convidado
                </div>
                <div style="display:flex;gap:0.75rem;">
                    <input class="search-input" id="busca-input" style="flex:1;"
                           placeholder="Nome completo ou CPF (ex: 000.000.000-00)"
                           onkeydown="if(event.key==='Enter') buscar()">
                    <button class="btn-primary" id="btn-buscar" onclick="buscar()">
                        <i data-lucide="search" style="width:16px;"></i> Buscar
                    </button>
                </div>
            </div>

            <!-- Resultados -->
            <div id="result-area"></div>
        </div>

        <!-- Loading -->
        <div id="page-loading" class="empty-state">
            <i data-lucide="loader" class="spin" style="width:32px;"></i>
            <div style="margin-top:0.75rem;">Carregando…</div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script src="../config.js"></script>
    <script src="supabase-helper-m3.js"></script>
    <script>
        // ── State ─────────────────────────────────────────────
        const params  = new URLSearchParams(location.search);
        const eventId = params.get('event_id');
        if (!eventId) location.href = 'eventos.html';

        let evento = null;

        // ── Utilities ─────────────────────────────────────────
        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
                .replace(/'/g,'&#39;');
        }
        function showToast(msg, type = 'success') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.innerHTML = `<i data-lucide="${type==='success'?'check-circle':'alert-circle'}" style="width:18px;flex-shrink:0;"></i><span>${esc(msg)}</span>`;
            c.appendChild(t);
            reIcons();
            setTimeout(() => t.remove(), 4500);
        }
        function reIcons() { if (window.lucide) window.lucide.createIcons(); }
        function fmtDate(d) {
            if (!d) return '—';
            try { return new Date(d + 'T12:00:00').toLocaleDateString('pt-BR'); } catch { return d; }
        }

        const STATUS_LABELS = {
            pendente:'Pendente', convite_enviado:'Convite Enviado',
            confirmado:'Confirmado', recusado:'Recusado',
            lista_enviada:'Lista Enviada', concluido:'Concluído'
        };

        // ── Init ──────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            renderSidebarM3();
            reIcons();

            const sb = await initSupabase();
            if (!sb) return;
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { location.href = '../index.html#login'; return; }

            try {
                evento = await getEventoDetalhe(eventId);

                document.getElementById('btn-voltar').href = `evento-detalhe.html?id=${eventId}`;
                document.getElementById('ev-titulo').textContent = evento.titulo;
                document.getElementById('ev-local').textContent  =
                    `${evento.nome_local}, ${evento.cidade}/${evento.estado}`;
                document.getElementById('ev-data').textContent   =
                    fmtDate(evento.data_evento) + (evento.horario ? ' · ' + evento.horario.slice(0,5) : '');
                document.getElementById('ev-cotas').textContent  =
                    `OS: ${evento.ingressos_os} ingressos  |  PA: ${evento.ingressos_pa} ingressos`;

                document.getElementById('page-loading').style.display = 'none';
                document.getElementById('page-body').style.display    = '';
                reIcons();

                setTimeout(() => document.getElementById('busca-input').focus(), 150);
            } catch (err) {
                console.error(err);
                document.getElementById('page-loading').innerHTML = `
                    <div class="empty-state" style="color:#FF5807;">
                        <i data-lucide="alert-circle" style="width:32px;"></i>
                        <div style="margin-top:0.75rem;">Erro ao carregar evento: ${esc(err.message)}</div>
                    </div>`;
                reIcons();
            }
        });

        // ── Busca ──────────────────────────────────────────────
        async function buscar() {
            const termo = document.getElementById('busca-input').value.trim();
            if (!termo) return;

            const btn = document.getElementById('btn-buscar');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="spin" style="width:16px;"></i> Buscando…';
            reIcons();

            try {
                const resultados = await buscarConvidadoPortaria(eventId, termo);
                renderResultados(resultados);
            } catch (err) {
                showToast('Erro na busca: ' + (err.message || ''), 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="search" style="width:16px;"></i> Buscar';
                reIcons();
            }
        }

        // ── Render resultados ─────────────────────────────────
        function renderResultados(resultados) {
            const area = document.getElementById('result-area');

            if (!resultados.length) {
                area.innerHTML = `
                    <div class="empty-state" style="padding:3rem 1rem;">
                        <i data-lucide="search-x" style="width:40px;opacity:0.35;"></i>
                        <div style="margin-top:0.75rem;font-size:1rem;font-weight:600;color:var(--text-primary);">
                            Convidado não encontrado neste evento
                        </div>
                        <div style="margin-top:0.35rem;font-size:0.875rem;color:var(--text-muted);">
                            Verifique a grafia do nome ou o número do CPF.
                        </div>
                    </div>`;
                reIcons();
                return;
            }

            area.innerHTML = resultados.map(g => {
                const vincOs    = (evento.distribution_event_os || []).find(v => v.os_id === g.os_id);
                const vincPa    = (evento.distribution_event_pa || []).find(v => v.pa_id === g.pa_id);
                const tipo      = g.os_id ? 'OS' : 'PA';
                const nomeOrg   = g.os_id
                    ? (g.distribution_os?.nome  || vincOs?.distribution_os?.nome  || '—')
                    : (g.distribution_pa?.nome  || vincPa?.distribution_pa?.nome  || '—');
                const status    = vincOs?.status || vincPa?.status || '—';
                const statusCls = status !== '—' ? 'badge-' + status : 'badge-gray';
                const statusLbl = STATUS_LABELS[status] || status;
                const ingressos = vincOs?.ingressos_alocados ?? vincPa?.ingressos_alocados ?? '—';

                return `
                    <div class="result-card">
                        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
                            <div>
                                <div style="font-weight:700;font-size:1.05rem;color:var(--text-primary);">
                                    ${esc(g.nome_completo)}
                                </div>
                                <div style="color:var(--text-muted);font-size:0.875rem;margin-top:0.25rem;display:flex;align-items:center;gap:0.4rem;">
                                    <span class="badge badge-gray" style="font-size:0.72rem;">${tipo}</span>
                                    ${esc(nomeOrg)}
                                </div>
                            </div>
                            <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;">
                                <span class="badge ${esc(statusCls)}">${esc(statusLbl)}</span>
                                <span style="font-size:0.82rem;color:var(--text-muted);">${ingressos} ingresso(s)</span>
                            </div>
                        </div>
                    </div>`;
            }).join('');
            reIcons();
        }
    </script>
</body>
</html>
