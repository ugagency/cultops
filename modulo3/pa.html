<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestAI — Patrocinadores (M3)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="m3-shared.css">

    <style>
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
        }

        .pa-card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 0;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .pa-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(21,71,255,0.13);
        }

        .pa-card-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 0.4rem;
        }

        .pa-card-info {
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .pa-card-info-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pa-card-footer {
            border-top: 1px solid #f1f5f9;
            padding-top: 0.75rem;
            display: flex;
            justify-content: flex-end;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-wrap i {
            position: absolute;
            left: 0.75rem;
            color: var(--text-muted);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <main class="main-content">
        <header class="page-header">
            <div>
                <h1>Patrocinadores</h1>
                <p>Gestão de pontos de apoio para distribuição de ingressos.</p>
            </div>
            <div class="header-actions">
                <div class="search-wrap">
                    <i data-lucide="search" style="width:16px;height:16px;"></i>
                    <input type="text" id="search-input" class="search-input" placeholder="Buscar por nome…">
                </div>
                <button class="btn-primary" onclick="openCreateModal()">
                    <i data-lucide="plus" style="width:16px;"></i> Novo PA
                </button>
            </div>
        </header>

        <div id="cards-grid" class="cards-grid"></div>
    </main>

    <!-- ── Modal PA ─────────────────────────────────────────── -->
    <div id="modal-backdrop" class="modal-backdrop" style="display:none;">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modal-title">Novo Patrocinador</h2>
                <button class="btn-icon" onclick="closeModal()">
                    <i data-lucide="x" style="width:22px;height:22px;"></i>
                </button>
            </div>

            <div class="form-grid">
                <!-- Dados básicos -->
                <div class="form-group span-2">
                    <label>Nome do Patrocinador *</label>
                    <input type="text" id="f-nome" placeholder="Ex: Instituto Cultural Futuro…">
                </div>
                <div class="form-group">
                    <label>CNPJ</label>
                    <input type="text" id="f-cnpj" placeholder="00.000.000/0000-00">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="f-email" placeholder="contato@patrocinador.com.br">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="f-telefone" placeholder="(00) 00000-0000">
                </div>
                <div class="form-group"></div><!-- spacer -->

                <!-- Endereço -->
                <div class="form-section-title">Endereço</div>
                <div class="form-group span-2">
                    <label>Logradouro</label>
                    <input type="text" id="f-endereco" placeholder="Rua, número, complemento…">
                </div>
                <div class="form-group">
                    <label>Cidade</label>
                    <input type="text" id="f-cidade" placeholder="Ex: São Paulo">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="f-estado">
                        <option value="">Selecione</option>
                        <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
                        <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
                        <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
                        <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
                        <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
                        <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
                        <option>SP</option><option>SE</option><option>TO</option>
                    </select>
                </div>

                <!-- Coordenador -->
                <div class="form-section-title">Coordenador</div>
                <div class="form-group span-2">
                    <label>Nome do Coordenador</label>
                    <input type="text" id="f-coord-nome" placeholder="Nome completo">
                </div>
                <div class="form-group">
                    <label>E-mail do Coordenador</label>
                    <input type="email" id="f-coord-email" placeholder="coord@patrocinador.com.br">
                </div>
                <div class="form-group">
                    <label>Telefone do Coordenador</label>
                    <input type="text" id="f-coord-tel" placeholder="(00) 00000-0000">
                </div>
            </div>

            <div class="modal-footer">
                <div id="modal-delete-wrap" style="display:none;">
                    <button class="btn-danger" onclick="confirmDelete()">
                        <i data-lucide="trash-2" style="width:15px;"></i> Excluir
                    </button>
                </div>
                <div class="actions-right">
                    <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button class="btn-primary" id="modal-submit-btn" onclick="submitForm()">
                        <i data-lucide="save" style="width:15px;"></i> Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Confirm Delete ────────────────────────────────────── -->
    <div id="confirm-backdrop" class="modal-backdrop" style="display:none;z-index:3000;">
        <div class="confirm-card">
            <i data-lucide="alert-triangle" style="width:40px;height:40px;color:#FF5807;margin:0 auto 1rem;display:block;"></i>
            <h3>Excluir Patrocinador?</h3>
            <p>Esta ação é irreversível. Todos os dados deste PA serão removidos permanentemente.</p>
            <div style="display:flex;gap:0.75rem;justify-content:center;">
                <button class="btn-secondary" onclick="cancelDelete()">Cancelar</button>
                <button class="btn-danger" id="confirm-delete-btn" onclick="executeDelete()">
                    <i data-lucide="trash-2" style="width:15px;"></i> Confirmar Exclusão
                </button>
            </div>
        </div>
    </div>

    <!-- ── Toast container ──────────────────────────────────── -->
    <div id="toast-container" class="toast-container"></div>

    <script src="../config.js"></script>
    <script src="supabase-helper-m3.js"></script>
    <script>
        // ── State ────────────────────────────────────────────
        let currentEditId = null;
        const paMap = new Map();

        // ── Utilities ────────────────────────────────────────
        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
                .replace(/'/g,'&#39;');
        }

        function showToast(msg, type = 'success') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" style="width:18px;flex-shrink:0;"></i><span>${esc(msg)}</span>`;
            c.appendChild(t);
            if (window.lucide) window.lucide.createIcons();
            setTimeout(() => t.remove(), 4500);
        }

        function reIcons() { if (window.lucide) window.lucide.createIcons(); }

        // ── Init ─────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            renderSidebarM3();
            reIcons();

            const sb = await initSupabase();
            if (!sb) return;
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = '../index.html#login'; return; }

            await loadCards();

            let debounce;
            document.getElementById('search-input').addEventListener('input', e => {
                clearTimeout(debounce);
                debounce = setTimeout(() => loadCards(e.target.value), 300);
            });
        });

        // ── Load & Render ─────────────────────────────────────
        async function loadCards(busca = '') {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = `<div style="grid-column:1/-1;"><div class="empty-state">
                <i data-lucide="loader" class="spin" style="width:28px;"></i>
                <div style="margin-top:0.5rem;">Carregando…</div>
            </div></div>`;
            reIcons();

            try {
                const list = await getPatrocinadores(busca);
                paMap.clear();
                list.forEach(pa => paMap.set(pa.id, pa));

                if (!list.length) {
                    const msg = busca
                        ? `Nenhum PA encontrado para "<strong>${esc(busca)}</strong>".`
                        : 'Nenhum Patrocinador cadastrado ainda. Clique em <strong>Novo PA</strong> para começar.';
                    grid.innerHTML = `<div style="grid-column:1/-1;"><div class="empty-state">
                        <i data-lucide="building-2" style="width:36px;"></i>
                        <div style="margin-top:0.75rem;">${msg}</div>
                    </div></div>`;
                    reIcons();
                    return;
                }

                grid.innerHTML = list.map(pa => renderCard(pa)).join('');
                reIcons();
            } catch (err) {
                console.error(err);
                grid.innerHTML = `<div style="grid-column:1/-1;"><div class="empty-state" style="color:#FF5807;">
                    <i data-lucide="alert-circle" style="width:28px;"></i>
                    <div style="margin-top:0.5rem;">Erro ao carregar: ${esc(err.message)}</div>
                </div></div>`;
                reIcons();
            }
        }

        function renderCard(pa) {
            const infoRows = [
                (pa.cidade || pa.estado) ? `<div class="pa-card-info-row"><i data-lucide="map-pin" style="width:14px;flex-shrink:0;color:#94a3b8;"></i><span>${[pa.cidade, pa.estado].filter(Boolean).map(esc).join('/')}</span></div>` : '',
                pa.nome_coordenador ? `<div class="pa-card-info-row"><i data-lucide="user" style="width:14px;flex-shrink:0;color:#94a3b8;"></i><span>${esc(pa.nome_coordenador)}</span></div>` : '',
                pa.email ? `<div class="pa-card-info-row"><i data-lucide="mail" style="width:14px;flex-shrink:0;color:#94a3b8;"></i><span>${esc(pa.email)}</span></div>` : '',
                pa.telefone ? `<div class="pa-card-info-row"><i data-lucide="phone" style="width:14px;flex-shrink:0;color:#94a3b8;"></i><span>${esc(pa.telefone)}</span></div>` : '',
            ].filter(Boolean).join('');

            const cnpjBadge = pa.cnpj
                ? `<span class="badge badge-gray" style="font-size:0.68rem;">${esc(pa.cnpj)}</span>`
                : '';

            return `
                <div class="glass-card pa-card">
                    <div>
                        <div class="pa-card-name">${esc(pa.nome)}</div>
                        ${cnpjBadge}
                    </div>
                    <div class="pa-card-info">${infoRows || '<span style="color:#c0c8d8;font-size:0.8rem;">Sem informações adicionais</span>'}</div>
                    <div class="pa-card-footer">
                        <button class="btn-secondary" style="padding:0.45rem 1rem;font-size:0.825rem;" onclick="openEditModal('${esc(pa.id)}')">
                            <i data-lucide="pencil" style="width:14px;"></i> Editar
                        </button>
                    </div>
                </div>
            `;
        }

        // ── Modal open/close ──────────────────────────────────
        function openCreateModal() {
            currentEditId = null;
            document.getElementById('modal-title').textContent = 'Novo Patrocinador';
            document.getElementById('modal-delete-wrap').style.display = 'none';
            clearForm();
            document.getElementById('modal-backdrop').style.display = 'flex';
            reIcons();
        }

        function openEditModal(id) {
            const pa = paMap.get(id);
            if (!pa) return;
            currentEditId = id;
            document.getElementById('modal-title').textContent = 'Editar Patrocinador';
            document.getElementById('modal-delete-wrap').style.display = '';
            fillForm(pa);
            document.getElementById('modal-backdrop').style.display = 'flex';
            reIcons();
        }

        function closeModal() {
            document.getElementById('modal-backdrop').style.display = 'none';
        }

        // ── Form helpers ──────────────────────────────────────
        const FIELDS = ['f-nome','f-cnpj','f-email','f-telefone','f-endereco',
                        'f-cidade','f-estado','f-coord-nome','f-coord-email','f-coord-tel'];

        function clearForm() {
            FIELDS.forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
        }

        function fillForm(pa) {
            const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val ?? ''; };
            set('f-nome',        pa.nome);
            set('f-cnpj',        pa.cnpj);
            set('f-email',       pa.email);
            set('f-telefone',    pa.telefone);
            set('f-endereco',    pa.endereco);
            set('f-cidade',      pa.cidade);
            set('f-estado',      pa.estado);
            set('f-coord-nome',  pa.nome_coordenador);
            set('f-coord-email', pa.email_coordenador);
            set('f-coord-tel',   pa.tel_coordenador);
        }

        function getFormData() {
            const v = id => document.getElementById(id)?.value.trim() || null;
            return {
                nome:              v('f-nome'),
                cnpj:              v('f-cnpj'),
                email:             v('f-email'),
                telefone:          v('f-telefone'),
                endereco:          v('f-endereco'),
                cidade:            v('f-cidade'),
                estado:            v('f-estado'),
                nome_coordenador:  v('f-coord-nome'),
                email_coordenador: v('f-coord-email'),
                tel_coordenador:   v('f-coord-tel'),
            };
        }

        // ── Submit ────────────────────────────────────────────
        async function submitForm() {
            const dados = getFormData();
            if (!dados.nome) { showToast('Nome é obrigatório.', 'error'); return; }

            const btn = document.getElementById('modal-submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="spin" style="width:15px;"></i> Salvando…';
            reIcons();

            try {
                if (currentEditId) {
                    await updatePatrocinador(currentEditId, dados);
                    showToast('Patrocinador atualizado com sucesso!');
                } else {
                    await createPatrocinador(dados);
                    showToast('Patrocinador criado com sucesso!');
                }
                closeModal();
                await loadCards(document.getElementById('search-input').value);
            } catch (err) {
                console.error(err);
                showToast('Erro: ' + (err.message || 'Tente novamente.'), 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="save" style="width:15px;"></i> Salvar';
                reIcons();
            }
        }

        // ── Delete ────────────────────────────────────────────
        function confirmDelete() {
            document.getElementById('confirm-backdrop').style.display = 'flex';
            reIcons();
        }

        function cancelDelete() {
            document.getElementById('confirm-backdrop').style.display = 'none';
        }

        async function executeDelete() {
            const btn = document.getElementById('confirm-delete-btn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="spin" style="width:15px;"></i> Excluindo…';
            reIcons();

            try {
                await deletePatrocinador(currentEditId);
                showToast('Patrocinador excluído.');
                cancelDelete();
                closeModal();
                await loadCards(document.getElementById('search-input').value);
            } catch (err) {
                console.error(err);
                showToast('Erro ao excluir: ' + (err.message || ''), 'error');
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="trash-2" style="width:15px;"></i> Confirmar Exclusão';
                reIcons();
            }
        }
    </script>
</body>
</html>
