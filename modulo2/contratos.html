<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestAI — Gestão de Contratos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="m2-shared.css">

    <style>
        .contracts-container { margin-top: 2rem; }
        .contract-row { cursor: pointer; }
        .contract-row:hover { background: #F5F0E8; }
        .contract-row.expanded { background: #E3E8FF; }
        .row-chevron { color: var(--text-muted); transition: transform 0.2s; }
        .contract-row.expanded .row-chevron { transform: rotate(180deg); color: var(--m2-accent); }

        .accordion-row td { padding: 0 !important; background: #F5F0E8; border-top: none !important; }
        .accordion-content {
            padding: 1.25rem 1.5rem 1.5rem 1.5rem;
            border-left: 4px solid var(--m2-accent);
            margin: 0;
        }
        .accordion-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
        }
        .accordion-tab {
            padding: 0.6rem 1rem;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }
        .accordion-tab.active {
            color: var(--m2-accent);
            border-bottom-color: var(--m2-accent);
        }
        .accordion-tab:hover { color: var(--m2-accent); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .inner-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .inner-table th {
            text-align: left;
            padding: 0.7rem 0.85rem;
            background: #E3E8FF;
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid var(--border-light);
        }
        .inner-table th.num, .inner-table td.num { text-align: right; }
        .inner-table td {
            padding: 0.7rem 0.85rem;
            border-bottom: 1px solid var(--border-light);
        }
        .inner-table tr:last-child td { border-bottom: none; }

        .toolbar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        /* Badges de status — completos conforme spec */
        .badge-m2 {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.7rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: lowercase;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .badge-ativo       { background: #1547FF; color: #70FF00; }
        .badge-encerrado   { background: #C6D0FF; color: #334155; }
        .badge-suspenso    { background: #6c757d; color: white; }
        .badge-cancelado   { background: #721c24; color: white; }
        .badge-rescindido  { background: #721c24; color: white; }
        .badge-pendente    { background: #FF5807; color: #FFFFFF; }
        .badge-paga        { background: #1547FF; color: #70FF00; }
        .badge-atrasada    { background: #FF5807; color: #FFFFFF; }
        .badge-cancelada   { background: #C6D0FF; color: #475569; }

        /* Alerta calculado no frontend */
        .alert-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            white-space: nowrap;
            margin-left: 0.4rem;
        }
        .alert-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
        .alert-vencida  { background: #FF5807; color: #FFFFFF; }
        .alert-vencida::before  { background: #FF5807; }
        .alert-vencendo { background: #FF5807; color: #FFFFFF; }
        .alert-vencendo::before { background: #FF5807; }

        /* Modal */
        .modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 9998; padding: 1rem;
        }
        .modal-backdrop[hidden] { display: none; }
        .modal-dialog {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .modal-dialog h3 { margin: 0 0 1.25rem 0; font-size: 1.2rem; }
        .form-grid { display: flex; flex-direction: column; gap: 1rem; }
        .form-grid .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-grid label {
            display: flex; flex-direction: column; gap: 0.35rem;
            font-size: 0.78rem; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.03em;
        }
        .form-grid input,
        .form-grid select,
        .form-grid textarea {
            padding: 0.65rem 0.8rem;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-family: inherit;
            background: white;
            text-transform: none;
            letter-spacing: normal;
        }
        .form-grid input:focus,
        .form-grid select:focus,
        .form-grid textarea:focus {
            outline: none;
            border-color: var(--m2-accent);
            box-shadow: 0 0 0 3px rgba(21, 71, 255, 0.15);
        }
        .modal-actions {
            display: flex; gap: 0.75rem; justify-content: flex-end;
            margin-top: 1.5rem;
        }
        .btn-modal {
            padding: 0.65rem 1.2rem;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            border: 1px solid transparent;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn-modal-cancel { background: white; color: var(--text-secondary); border-color: var(--border-light); }
        .btn-modal-cancel:hover { background: #F5F0E8; }
        .btn-modal-primary {
            background: linear-gradient(135deg, var(--m2-accent), var(--m2-accent-hover));
            color: white;
        }
        .btn-modal-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-inline {
            padding: 0.35rem 0.7rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-light);
            background: white;
            display: inline-flex; align-items: center; gap: 0.3rem;
        }
        .btn-inline:hover { border-color: var(--m2-accent); color: var(--m2-accent); }
        .btn-inline.primary {
            background: var(--m2-accent); color: white; border-color: transparent;
        }
        .btn-inline.primary:hover { background: var(--m2-accent-hover); color: white; }

        .empty-mini {
            padding: 1.5rem 1rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            background: white;
            border-radius: var(--radius-md);
        }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="toast-notification" id="toast" style="position: fixed; bottom: 2.5rem; right: 2.5rem; padding: 1.25rem 2rem; border-radius: var(--radius-md); color: white; font-weight: 700; font-size: 0.95rem; z-index: 10000; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); transform: translateY(150%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);"></div>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1>Gestão de Contratos</h1>
                <p style="color: var(--text-secondary);">Gerencie contratos de fornecedores, parcelas e aditivos vinculados às rubricas.</p>
            </div>

            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="project-selector-container">
                    <i data-lucide="briefcase" style="width: 18px; color: var(--text-secondary);"></i>
                    <select id="project-select" onchange="handleProjectChange(this.value)">
                        <option value="">Selecione um Projeto (PRONAC)...</option>
                    </select>
                </div>

                <button class="btn-m2 btn-m2-primary" id="btn-novo-contrato" onclick="openContratoModal()">
                    <i data-lucide="plus"></i>
                    Novo Contrato
                </button>
            </div>
        </header>

        <div class="glass-card" style="padding: 0; overflow: hidden;">
            <table class="m2-table">
                <thead>
                    <tr>
                        <th style="width: 32px;"></th>
                        <th>Nº Contrato</th>
                        <th>Fornecedor</th>
                        <th>Objeto</th>
                        <th>Vigência</th>
                        <th>Valor Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="contracts-list">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 3rem; color: var(--text-muted);">
                            Selecione um projeto para listar os contratos.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- ============= MODAL: NOVO CONTRATO ============= -->
    <div id="modal-contrato" class="modal-backdrop" hidden onclick="if(event.target===this) closeContratoModal()">
        <div class="modal-dialog">
            <h3><i data-lucide="file-plus" style="width:18px; vertical-align:-3px;"></i> Cadastrar novo contrato</h3>
            <form id="form-contrato" class="form-grid" onsubmit="event.preventDefault(); submitContrato();">
                <div class="row-2">
                    <label>
                        Número <span style="color:#FF5807;">*</span>
                        <input type="text" id="c-numero" required maxlength="50" placeholder="Ex: 2026/001">
                    </label>
                    <label>
                        Valor total (R$) <span style="color:#FF5807;">*</span>
                        <input type="number" step="0.01" min="0.01" id="c-valor" required>
                    </label>
                </div>

                <label>
                    Objeto <span style="color:#FF5807;">*</span>
                    <textarea id="c-objeto" rows="3" required maxlength="500" placeholder="Descreva o objeto do contrato..."></textarea>
                </label>

                <div class="row-2">
                    <label>
                        Início <span style="color:#FF5807;">*</span>
                        <input type="date" id="c-inicio" required>
                    </label>
                    <label>
                        Fim <span style="color:#FF5807;">*</span>
                        <input type="date" id="c-fim" required>
                    </label>
                </div>

                <label>
                    Fornecedor <span style="color:#FF5807;">*</span>
                    <select id="c-fornecedor" required>
                        <option value="">Carregando…</option>
                    </select>
                </label>

                <label>
                    Rubrica <span style="color:#FF5807;">*</span>
                    <select id="c-rubrica" required>
                        <option value="">Carregando…</option>
                    </select>
                </label>

                <label>
                    Arquivo (PDF) <span style="color: var(--text-muted); font-weight: 400; font-size: 0.75rem; text-transform: none; letter-spacing: normal;">— opcional</span>
                    <input type="file" id="c-arquivo" accept="application/pdf">
                </label>

                <div class="modal-actions">
                    <button type="button" class="btn-modal btn-modal-cancel" onclick="closeContratoModal()">Cancelar</button>
                    <button type="submit" class="btn-modal btn-modal-primary" id="btn-salvar-contrato">
                        <i data-lucide="check" style="width:16px;"></i> Salvar contrato
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============= MODAL: NOVA PARCELA ============= -->
    <div id="modal-parcela" class="modal-backdrop" hidden onclick="if(event.target===this) closeParcelaModal()">
        <div class="modal-dialog" style="max-width: 460px;">
            <h3><i data-lucide="calendar-plus" style="width:18px; vertical-align:-3px;"></i> Nova parcela</h3>
            <form id="form-parcela" class="form-grid" onsubmit="event.preventDefault(); submitParcela();">
                <div class="row-2">
                    <label>
                        Nº parcela <span style="color:#FF5807;">*</span>
                        <input type="number" min="1" id="p-numero" required>
                    </label>
                    <label>
                        Valor (R$) <span style="color:#FF5807;">*</span>
                        <input type="number" step="0.01" min="0.01" id="p-valor" required>
                    </label>
                </div>
                <label>
                    Data de vencimento <span style="color:#FF5807;">*</span>
                    <input type="date" id="p-vencimento" required>
                </label>

                <div class="modal-actions">
                    <button type="button" class="btn-modal btn-modal-cancel" onclick="closeParcelaModal()">Cancelar</button>
                    <button type="submit" class="btn-modal btn-modal-primary" id="btn-salvar-parcela">
                        <i data-lucide="check" style="width:16px;"></i> Salvar parcela
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============= MODAL: NOVO ADITIVO ============= -->
    <div id="modal-aditivo" class="modal-backdrop" hidden onclick="if(event.target===this) closeAditivoModal()">
        <div class="modal-dialog">
            <h3><i data-lucide="git-branch" style="width:18px; vertical-align:-3px;"></i> Registrar aditivo</h3>
            <form id="form-aditivo" class="form-grid" onsubmit="event.preventDefault(); submitAditivo();">
                <label>
                    Tipo <span style="color:#FF5807;">*</span>
                    <select id="a-tipo" required onchange="onAditivoTipoChange()">
                        <option value="prazo">Prorrogação de prazo</option>
                        <option value="valor">Alteração de valor</option>
                        <option value="objeto">Alteração de objeto</option>
                        <option value="supressao">Supressão</option>
                        <option value="rescisao">Rescisão</option>
                        <option value="outros">Outros</option>
                    </select>
                </label>

                <label>
                    Descrição <span style="color:#FF5807;">*</span>
                    <textarea id="a-descricao" rows="3" required maxlength="500" placeholder="Justificativa do aditivo..."></textarea>
                </label>

                <label>
                    Data do aditivo <span style="color:#FF5807;">*</span>
                    <input type="date" id="a-data" required>
                </label>

                <label id="a-wrap-nova-data">
                    Nova data fim <span id="a-req-nova-data" style="color:#FF5807;">*</span>
                    <input type="date" id="a-nova-data-fim">
                </label>

                <label id="a-wrap-novo-valor">
                    Novo valor total (R$) <span id="a-req-novo-valor" style="color:#FF5807; display:none;">*</span>
                    <input type="number" step="0.01" min="0" id="a-novo-valor">
                </label>

                <div class="modal-actions">
                    <button type="button" class="btn-modal btn-modal-cancel" onclick="closeAditivoModal()">Cancelar</button>
                    <button type="submit" class="btn-modal btn-modal-primary" id="btn-salvar-aditivo">
                        <i data-lucide="check" style="width:16px;"></i> Registrar aditivo
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="supabase-helper.js"></script>
    <script>
        let sb = null;
        let currentProjectId = ProjectManager.getSelected();
        let contractsCache = [];
        let parcelasVencidasSet = new Set();
        let expandedContractId = null;
        let parcelaModalCtx = null;   // { contractId, projectId }
        let aditivoModalCtx = null;   // { contractId, projectId, contract }

        document.addEventListener('DOMContentLoaded', async () => {
            if (window.renderSidebar) window.renderSidebar();
            sb = await initSupabase();
            await populateProjectSelect();

            if (currentProjectId) {
                document.getElementById('project-select').value = currentProjectId;
                await loadContracts();
            }
            if (window.lucide) window.lucide.createIcons();
        });

        async function populateProjectSelect() {
            const projects = await loadProjects();
            const select = document.getElementById('project-select');
            (projects || []).forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = `${p.pronac} - ${p.nome}`;
                select.appendChild(opt);
            });
        }

        async function handleProjectChange(id) {
            currentProjectId = id;
            ProjectManager.setSelected(id);
            expandedContractId = null;
            await loadContracts();
        }

        // ─────────────────────────────────────────────────────────────
        // LISTAGEM DE CONTRATOS
        // ─────────────────────────────────────────────────────────────
        async function loadContracts() {
            if (!currentProjectId) return;
            const hoje = new Date().toISOString().split('T')[0];

            const [contratosRes, vencidasRes] = await Promise.all([
                sb.from('contracts')
                    .select('*, fornecedores(razao_social, cnpj)')
                    .eq('project_id', currentProjectId)
                    .order('data_inicio', { ascending: false }),
                sb.from('contract_parcelas')
                    .select('contract_id')
                    .eq('project_id', currentProjectId)
                    .eq('status', 'pendente')
                    .lt('data_vencimento', hoje)
            ]);

            if (contratosRes.error) {
                console.error('[loadContracts]', contratosRes.error);
                showToast('Erro ao carregar contratos: ' + contratosRes.error.message, 'error');
                return;
            }

            contractsCache = contratosRes.data || [];
            parcelasVencidasSet = new Set((vencidasRes.data || []).map(p => p.contract_id));
            renderContracts(contractsCache);
        }

        function renderContracts(contracts) {
            const container = document.getElementById('contracts-list');
            if (!contracts || contracts.length === 0) {
                container.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 3rem; color: var(--text-muted);">
                            Nenhum contrato encontrado para este projeto.
                        </td>
                    </tr>
                `;
                if (window.lucide) window.lucide.createIcons();
                return;
            }

            container.innerHTML = contracts.map(c => {
                const isExpanded = expandedContractId === c.id;
                const hasVencidas = parcelasVencidasSet.has(c.id);
                return `
                    <tr class="contract-row ${isExpanded ? 'expanded' : ''}" onclick="toggleContract('${c.id}')">
                        <td><i data-lucide="chevron-down" class="row-chevron" style="width:18px;"></i></td>
                        <td style="font-weight: 700;">${escapeHtml(c.numero || 'S/N')}</td>
                        <td>${escapeHtml(c.fornecedores ? c.fornecedores.razao_social : 'Não informado')}</td>
                        <td style="max-width: 240px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${escapeHtml(c.objeto)}">${escapeHtml(c.objeto)}</td>
                        <td style="white-space: nowrap;">${formatDate(c.data_inicio)} → ${formatDate(c.data_fim)}</td>
                        <td style="font-weight: 700; color: var(--m2-accent); white-space: nowrap;">${formatCurrency(c.valor_total)}</td>
                        <td>
                            <span class="badge-m2 badge-${c.status || 'ativo'}">${c.status || 'ativo'}</span>
                            ${hasVencidas ? `<span class="alert-pill alert-vencida">Parcela vencida</span>` : ''}
                        </td>
                    </tr>
                    ${isExpanded ? `
                        <tr class="accordion-row">
                            <td colspan="7">
                                <div class="accordion-content">
                                    <div class="accordion-tabs">
                                        <button class="accordion-tab active" data-tab="parcelas" onclick="switchTab(event, 'parcelas')">
                                            <i data-lucide="layers" style="width:14px; vertical-align:-2px;"></i> Parcelas
                                        </button>
                                        <button class="accordion-tab" data-tab="aditivos" onclick="switchTab(event, 'aditivos')">
                                            <i data-lucide="git-branch" style="width:14px; vertical-align:-2px;"></i> Aditivos
                                        </button>
                                        ${c.arquivo_path ? `
                                            <button class="accordion-tab" style="margin-left:auto;" onclick="openContractFile('${c.arquivo_path.replace(/'/g, "\\'")}')">
                                                <i data-lucide="file-text" style="width:14px; vertical-align:-2px;"></i> Ver arquivo
                                            </button>
                                        ` : ''}
                                    </div>
                                    <div class="tab-panel active" id="panel-parcelas-${c.id}">
                                        <div class="empty-mini"><i data-lucide="loader" class="spin"></i> Carregando parcelas…</div>
                                    </div>
                                    <div class="tab-panel" id="panel-aditivos-${c.id}">
                                        <div class="empty-mini"><i data-lucide="loader" class="spin"></i> Carregando aditivos…</div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    ` : ''}
                `;
            }).join('');

            if (window.lucide) window.lucide.createIcons();

            if (expandedContractId) {
                loadParcelas(expandedContractId);
                loadAditivos(expandedContractId);
            }
        }

        function toggleContract(id) {
            expandedContractId = (expandedContractId === id) ? null : id;
            renderContracts(contractsCache);
        }

        function switchTab(e, tab) {
            e.stopPropagation();
            const tabsRoot = e.target.closest('.accordion-content');
            tabsRoot.querySelectorAll('.accordion-tab').forEach(b => {
                if (b.dataset && b.dataset.tab) {
                    b.classList.toggle('active', b.dataset.tab === tab);
                }
            });
            tabsRoot.querySelectorAll('.tab-panel').forEach(p => {
                p.classList.toggle('active', p.id.includes('panel-' + tab));
            });
        }

        // ─────────────────────────────────────────────────────────────
        // CADASTRO DE CONTRATO
        // ─────────────────────────────────────────────────────────────
        async function openContratoModal() {
            if (!currentProjectId) {
                showToast('Selecione um projeto primeiro!', 'error');
                return;
            }
            document.getElementById('form-contrato').reset();
            document.getElementById('btn-salvar-contrato').disabled = false;
            document.getElementById('btn-salvar-contrato').innerHTML = '<i data-lucide="check" style="width:16px;"></i> Salvar contrato';
            await loadFornecedoresSelect();
            await loadRubricasSelect();
            document.getElementById('modal-contrato').hidden = false;
            if (window.lucide) window.lucide.createIcons();
        }

        function closeContratoModal() {
            document.getElementById('modal-contrato').hidden = true;
        }

        async function loadFornecedoresSelect() {
            const select = document.getElementById('c-fornecedor');
            select.innerHTML = '<option value="">Carregando…</option>';

            const { data: vinculos, error: linkErr } = await sb
                .from('projeto_fornecedores')
                .select('fornecedor_id')
                .eq('project_id', currentProjectId);
            if (linkErr) {
                console.error('[loadFornecedoresSelect:vinculos]', linkErr);
                select.innerHTML = '<option value="">Erro ao carregar</option>';
                return;
            }
            const ids = (vinculos || []).map(v => v.fornecedor_id).filter(Boolean);
            if (ids.length === 0) {
                select.innerHTML = '<option value="">Nenhum fornecedor vinculado ao projeto</option>';
                return;
            }

            const { data: fornecedores, error: fErr } = await sb
                .from('fornecedores')
                .select('id, razao_social, cnpj')
                .in('id', ids)
                .order('razao_social', { ascending: true });
            if (fErr) {
                console.error('[loadFornecedoresSelect:fornecedores]', fErr);
                select.innerHTML = '<option value="">Erro ao carregar fornecedores</option>';
                return;
            }

            select.innerHTML = '<option value="">Selecione…</option>';
            (fornecedores || []).forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.textContent = `${f.razao_social} — ${formatCNPJ(f.cnpj)}`;
                select.appendChild(opt);
            });
        }

        async function loadRubricasSelect() {
            const select = document.getElementById('c-rubrica');
            select.innerHTML = '<option value="">Carregando…</option>';

            const { data, error } = await sb
                .from('rubricas')
                .select('id, nome, codigo, valor_aprovado, valor_utilizado')
                .eq('project_id', currentProjectId)
                .order('nome', { ascending: true });
            if (error) {
                console.error('[loadRubricasSelect]', error);
                select.innerHTML = '<option value="">Erro ao carregar</option>';
                return;
            }
            if (!data || data.length === 0) {
                select.innerHTML = '<option value="">Nenhuma rubrica cadastrada</option>';
                return;
            }

            select.innerHTML = '<option value="">Selecione…</option>';
            data.forEach(r => {
                const saldo = Number(r.valor_aprovado || 0) - Number(r.valor_utilizado || 0);
                const opt = document.createElement('option');
                opt.value = r.id;
                const codigo = r.codigo ? `${r.codigo} — ` : '';
                opt.textContent = `${codigo}${r.nome} (saldo ${formatCurrency(saldo)})`;
                select.appendChild(opt);
            });
        }

        async function submitContrato() {
            const numero = document.getElementById('c-numero').value.trim();
            const objeto = document.getElementById('c-objeto').value.trim();
            const valorTotal = parseFloat(document.getElementById('c-valor').value);
            const inicio = document.getElementById('c-inicio').value;
            const fim = document.getElementById('c-fim').value;
            const fornecedorId = document.getElementById('c-fornecedor').value || null;
            const rubricaId = document.getElementById('c-rubrica').value || null;
            const arquivo = document.getElementById('c-arquivo').files[0] || null;

            if (!numero || !objeto || !Number.isFinite(valorTotal) || valorTotal <= 0 || !inicio || !fim || !fornecedorId || !rubricaId) {
                showToast('Preencha todos os campos obrigatórios.', 'error');
                return;
            }
            if (fim < inicio) {
                showToast('A data fim deve ser igual ou posterior à data início.', 'error');
                return;
            }
            if (arquivo && arquivo.type !== 'application/pdf') {
                showToast('O arquivo do contrato deve ser PDF.', 'error');
                return;
            }

            const btn = document.getElementById('btn-salvar-contrato');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="spin" style="width:16px;"></i> Salvando…';
            if (window.lucide) window.lucide.createIcons();

            try {
                const orgId = await getCurrentOrgId(currentProjectId);
                if (!orgId) {
                    showToast('Não foi possível identificar a organização do projeto.', 'error');
                    return;
                }
                const { data: { user } } = await sb.auth.getUser();

                // (a) Upload primeiro se houver arquivo — usamos UUID gerado no client
                let arquivoPath = null;
                if (arquivo) {
                    const newUuid = (crypto && crypto.randomUUID) ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
                    const safeName = arquivo.name.replace(/[\/\\:*?"<>|]/g, '_');
                    arquivoPath = `${currentProjectId}/${newUuid}/${safeName}`;
                    btn.innerHTML = '<i data-lucide="loader" class="spin" style="width:16px;"></i> Enviando arquivo…';
                    if (window.lucide) window.lucide.createIcons();
                    const { error: upErr } = await sb.storage
                        .from('contracts')
                        .upload(arquivoPath, arquivo, { cacheControl: '3600', upsert: false, contentType: 'application/pdf' });
                    if (upErr) {
                        console.error('[upload contract]', upErr);
                        showToast('Falha no upload do arquivo: ' + upErr.message, 'error');
                        return;
                    }
                }

                // (b) INSERT contracts
                const { error: insErr } = await sb.from('contracts').insert({
                    project_id: currentProjectId,
                    organization_id: orgId,
                    fornecedor_id: fornecedorId,
                    rubrica_id: rubricaId,
                    numero, objeto, valor_total: valorTotal,
                    data_inicio: inicio, data_fim: fim,
                    arquivo_path: arquivoPath,
                    status: 'ativo',
                    criado_por: user ? user.id : null
                });
                if (insErr) {
                    // Se INSERT falhar mas arquivo já subiu, tentar limpar (best-effort)
                    if (arquivoPath) {
                        sb.storage.from('contracts').remove([arquivoPath]).catch(() => {});
                    }
                    throw insErr;
                }

                closeContratoModal();
                showToast('Contrato cadastrado com sucesso.', 'success');
                await loadContracts();
            } catch (err) {
                console.error('[submitContrato]', err);
                showToast('Erro ao salvar contrato: ' + (err.message || 'verifique o console'), 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="check" style="width:16px;"></i> Salvar contrato';
                if (window.lucide) window.lucide.createIcons();
            }
        }

        async function openContractFile(path) {
            event.stopPropagation && event.stopPropagation();
            if (!path) return;
            const { data, error } = await sb.storage.from('contracts').createSignedUrl(path, 3600);
            if (error || !data) {
                showToast('Erro ao gerar link do arquivo: ' + (error?.message || ''), 'error');
                return;
            }
            window.open(data.signedUrl, '_blank');
        }

        // ─────────────────────────────────────────────────────────────
        // PARCELAS
        // ─────────────────────────────────────────────────────────────
        async function loadParcelas(contractId) {
            const panel = document.getElementById(`panel-parcelas-${contractId}`);
            if (!panel) return;

            const { data, error } = await sb
                .from('contract_parcelas')
                .select('id, numero, valor, data_vencimento, data_pagamento, status')
                .eq('contract_id', contractId)
                .order('numero', { ascending: true });
            if (error) {
                console.error('[loadParcelas]', error);
                panel.innerHTML = `<div class="empty-mini">Erro: ${escapeHtml(error.message)}</div>`;
                return;
            }

            const toolbar = `
                <div class="toolbar-row">
                    <div style="font-weight: 600; color: var(--text-secondary); font-size: 0.85rem;">${(data || []).length} parcela(s)</div>
                    <button class="btn-inline primary" onclick="openParcelaModal('${contractId}')"><i data-lucide="plus" style="width:14px;"></i> Adicionar parcela</button>
                </div>
            `;

            if (!data || data.length === 0) {
                panel.innerHTML = toolbar + `<div class="empty-mini">Nenhuma parcela cadastrada.</div>`;
                if (window.lucide) window.lucide.createIcons();
                return;
            }

            const rows = data.map(p => {
                const alerta = computeParcelaBadge(p);
                const isOpen = p.status === 'pendente' || p.status === 'atrasada';
                return `
                    <tr>
                        <td><strong>${p.numero}</strong></td>
                        <td class="num">${formatCurrency(p.valor)}</td>
                        <td>${formatDate(p.data_vencimento)}</td>
                        <td>${p.data_pagamento ? formatDate(p.data_pagamento) : '—'}</td>
                        <td>
                            <span class="badge-m2 badge-${p.status}">${p.status}</span>
                            ${alerta}
                        </td>
                        <td>
                            ${isOpen
                                ? `<button class="btn-inline" onclick="markParcelaPaga('${p.id}', '${contractId}')"><i data-lucide="check" style="width:14px;"></i> Marcar paga</button>`
                                : '—'}
                        </td>
                    </tr>
                `;
            }).join('');

            panel.innerHTML = toolbar + `
                <table class="inner-table">
                    <thead>
                        <tr>
                            <th>Nº</th>
                            <th class="num">Valor</th>
                            <th>Vencimento</th>
                            <th>Pagamento</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
            if (window.lucide) window.lucide.createIcons();
        }

        function computeParcelaBadge(p) {
            if (p.status !== 'pendente') return '';
            if (!p.data_vencimento) return '';
            const hoje = new Date(); hoje.setHours(0,0,0,0);
            const venc = new Date(p.data_vencimento + 'T00:00:00');
            if (Number.isNaN(venc.getTime())) return '';
            const dias = Math.ceil((venc - hoje) / 86400000);
            if (dias < 0) return `<span class="alert-pill alert-vencida">VENCIDA</span>`;
            if (dias <= 7) {
                const t = dias === 0 ? 'Vence hoje' : dias === 1 ? 'Vence em 1 dia' : `Vence em ${dias} dias`;
                return `<span class="alert-pill alert-vencendo">${t}</span>`;
            }
            return '';
        }

        async function openParcelaModal(contractId) {
            parcelaModalCtx = { contractId };
            const cache = contractsCache.find(c => c.id === contractId);
            // sugere próximo número de parcela
            const { count } = await sb.from('contract_parcelas')
                .select('*', { count: 'exact', head: true })
                .eq('contract_id', contractId);
            document.getElementById('form-parcela').reset();
            document.getElementById('p-numero').value = (count || 0) + 1;
            document.getElementById('btn-salvar-parcela').disabled = false;
            document.getElementById('btn-salvar-parcela').innerHTML = '<i data-lucide="check" style="width:16px;"></i> Salvar parcela';
            document.getElementById('modal-parcela').hidden = false;
            if (window.lucide) window.lucide.createIcons();
        }

        function closeParcelaModal() {
            document.getElementById('modal-parcela').hidden = true;
            parcelaModalCtx = null;
        }

        async function submitParcela() {
            if (!parcelaModalCtx) return;
            const { contractId } = parcelaModalCtx;
            const numero = parseInt(document.getElementById('p-numero').value, 10);
            const valor = parseFloat(document.getElementById('p-valor').value);
            const vencimento = document.getElementById('p-vencimento').value;

            if (!Number.isFinite(numero) || numero <= 0 || !Number.isFinite(valor) || valor <= 0 || !vencimento) {
                showToast('Preencha todos os campos da parcela.', 'error');
                return;
            }

            const btn = document.getElementById('btn-salvar-parcela');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="spin" style="width:16px;"></i> Salvando…';
            if (window.lucide) window.lucide.createIcons();

            try {
                const orgId = await getCurrentOrgId(currentProjectId);
                const { error } = await sb.from('contract_parcelas').insert({
                    contract_id: contractId,
                    project_id: currentProjectId,
                    organization_id: orgId,
                    numero, valor,
                    data_vencimento: vencimento,
                    status: 'pendente'
                });
                if (error) throw error;
                closeParcelaModal();
                showToast('Parcela cadastrada.', 'success');
                await loadParcelas(contractId);
                await loadContracts(); // atualiza badge de "parcela vencida"
            } catch (err) {
                console.error('[submitParcela]', err);
                showToast('Erro ao cadastrar parcela: ' + (err.message || 'verifique o console'), 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="check" style="width:16px;"></i> Salvar parcela';
                if (window.lucide) window.lucide.createIcons();
            }
        }

        async function markParcelaPaga(parcelaId, contractId) {
            if (!confirm('Confirmar que esta parcela foi paga?')) return;
            const hoje = new Date().toISOString().split('T')[0]; // data_pagamento é DATE
            const { error } = await sb.from('contract_parcelas')
                .update({ status: 'paga', data_pagamento: hoje })
                .eq('id', parcelaId);
            if (error) {
                showToast('Erro ao marcar como paga: ' + error.message, 'error');
                return;
            }
            showToast('Parcela marcada como paga.', 'success');
            await loadParcelas(contractId);
            await loadContracts();
        }

        // ─────────────────────────────────────────────────────────────
        // ADITIVOS
        // ─────────────────────────────────────────────────────────────
        async function loadAditivos(contractId) {
            const panel = document.getElementById(`panel-aditivos-${contractId}`);
            if (!panel) return;

            const { data, error } = await sb
                .from('contract_aditivos')
                .select('id, tipo, descricao, data_aditivo, nova_data_fim, novo_valor')
                .eq('contract_id', contractId)
                .order('data_aditivo', { ascending: true });
            if (error) {
                console.error('[loadAditivos]', error);
                panel.innerHTML = `<div class="empty-mini">Erro: ${escapeHtml(error.message)}</div>`;
                return;
            }

            const toolbar = `
                <div class="toolbar-row">
                    <div style="font-weight: 600; color: var(--text-secondary); font-size: 0.85rem;">${(data || []).length} aditivo(s)</div>
                    <button class="btn-inline primary" onclick="openAditivoModal('${contractId}')"><i data-lucide="plus" style="width:14px;"></i> Registrar aditivo</button>
                </div>
            `;

            if (!data || data.length === 0) {
                panel.innerHTML = toolbar + `<div class="empty-mini">Nenhum aditivo registrado.</div>`;
                if (window.lucide) window.lucide.createIcons();
                return;
            }

            const rows = data.map(a => `
                <tr>
                    <td>${formatDate(a.data_aditivo)}</td>
                    <td><span class="badge-m2 badge-ativo" style="text-transform: capitalize;">${escapeHtml(a.tipo)}</span></td>
                    <td>${escapeHtml(a.descricao || '—')}</td>
                    <td>${a.nova_data_fim ? formatDate(a.nova_data_fim) : '—'}</td>
                    <td class="num">${a.novo_valor != null ? formatCurrency(a.novo_valor) : '—'}</td>
                </tr>
            `).join('');

            panel.innerHTML = toolbar + `
                <table class="inner-table">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Tipo</th>
                            <th>Descrição</th>
                            <th>Nova data fim</th>
                            <th class="num">Novo valor</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
            if (window.lucide) window.lucide.createIcons();
        }

        function openAditivoModal(contractId) {
            const contract = contractsCache.find(c => c.id === contractId);
            aditivoModalCtx = { contractId, contract };
            document.getElementById('form-aditivo').reset();
            document.getElementById('a-tipo').value = 'prazo';
            document.getElementById('a-data').value = new Date().toISOString().split('T')[0];
            onAditivoTipoChange();
            document.getElementById('btn-salvar-aditivo').disabled = false;
            document.getElementById('btn-salvar-aditivo').innerHTML = '<i data-lucide="check" style="width:16px;"></i> Registrar aditivo';
            document.getElementById('modal-aditivo').hidden = false;
            if (window.lucide) window.lucide.createIcons();
        }

        function closeAditivoModal() {
            document.getElementById('modal-aditivo').hidden = true;
            aditivoModalCtx = null;
        }

        function onAditivoTipoChange() {
            const tipo = document.getElementById('a-tipo').value;
            const wrapNova = document.getElementById('a-wrap-nova-data');
            const wrapValor = document.getElementById('a-wrap-novo-valor');
            const reqNova = document.getElementById('a-req-nova-data');
            const reqValor = document.getElementById('a-req-novo-valor');
            const inputNova = document.getElementById('a-nova-data-fim');
            const inputValor = document.getElementById('a-novo-valor');

            const showNova = tipo === 'prazo';
            const showValor = tipo === 'valor';
            // Mostra ambos (opcionais) só para supressão / outros
            const showBothOptional = tipo === 'supressao' || tipo === 'outros';
            // 'objeto' e 'rescisao' não usam nenhum dos dois campos

            wrapNova.style.display = (showNova || showBothOptional) ? '' : 'none';
            wrapValor.style.display = (showValor || showBothOptional) ? '' : 'none';
            reqNova.style.display = showNova ? '' : 'none';
            reqValor.style.display = showValor ? '' : 'none';
            inputNova.required = showNova;
            inputValor.required = showValor;
            if (!showNova && !showBothOptional) inputNova.value = '';
            if (!showValor && !showBothOptional) inputValor.value = '';
        }

        async function submitAditivo() {
            if (!aditivoModalCtx) return;
            const { contractId, contract } = aditivoModalCtx;
            const tipo = document.getElementById('a-tipo').value;
            const descricao = document.getElementById('a-descricao').value.trim();
            const dataAditivo = document.getElementById('a-data').value;
            const novaDataFimRaw = document.getElementById('a-nova-data-fim').value;
            const novoValorRaw = document.getElementById('a-novo-valor').value;

            if (!tipo || !descricao || !dataAditivo) {
                showToast('Preencha tipo, descrição e data do aditivo.', 'error');
                return;
            }
            if (tipo === 'prazo' && !novaDataFimRaw) {
                showToast('Para prorrogação de prazo, informe a nova data fim.', 'error');
                return;
            }
            if (tipo === 'valor' && (!novoValorRaw || parseFloat(novoValorRaw) <= 0)) {
                showToast('Para alteração de valor, informe um novo valor maior que zero.', 'error');
                return;
            }

            const btn = document.getElementById('btn-salvar-aditivo');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="spin" style="width:16px;"></i> Registrando…';
            if (window.lucide) window.lucide.createIcons();

            try {
                const orgId = await getCurrentOrgId(currentProjectId);
                const { data: { user } } = await sb.auth.getUser();

                const novaDataFim = novaDataFimRaw || null;
                const novoValor = novoValorRaw ? parseFloat(novoValorRaw) : null;

                const { error: insErr } = await sb.from('contract_aditivos').insert({
                    contract_id: contractId,
                    project_id: currentProjectId,
                    organization_id: orgId,
                    tipo, descricao,
                    data_aditivo: dataAditivo,
                    nova_data_fim: novaDataFim,
                    novo_valor: novoValor,
                    criado_por: user ? user.id : null
                });
                if (insErr) throw insErr;

                // Atualiza o contrato conforme o tipo
                const contractUpdate = {};
                if (tipo === 'prazo' && novaDataFim) contractUpdate.data_fim = novaDataFim;
                if (tipo === 'valor' && novoValor != null) contractUpdate.valor_total = novoValor;
                if (tipo === 'rescisao') contractUpdate.status = 'rescindido';
                // tipo === 'objeto' não altera contrato (só registra o aditivo)
                if (Object.keys(contractUpdate).length > 0) {
                    const { error: updErr } = await sb.from('contracts')
                        .update(contractUpdate)
                        .eq('id', contractId);
                    if (updErr) {
                        console.error('[update contract after aditivo]', updErr);
                        showToast('Aditivo registrado, mas falhou atualizar o contrato: ' + updErr.message, 'error');
                    }
                }

                closeAditivoModal();
                showToast('Aditivo registrado.', 'success');
                await loadAditivos(contractId);
                await loadContracts();
            } catch (err) {
                console.error('[submitAditivo]', err);
                showToast('Erro ao registrar aditivo: ' + (err.message || 'verifique o console'), 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="check" style="width:16px;"></i> Registrar aditivo';
                if (window.lucide) window.lucide.createIcons();
            }
        }

        // ─────────────────────────────────────────────────────────────
        // HELPERS
        // ─────────────────────────────────────────────────────────────
        function formatCNPJ(cnpj) {
            if (!cnpj) return '—';
            const c = String(cnpj).replace(/\D/g, '');
            if (c.length !== 14) return cnpj;
            return c.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, '$1.$2.$3/$4-$5');
        }

        function escapeHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            if (!t) return;
            t.innerText = msg;
            t.style.background = type === 'success' ? '#1547FF' : (type === 'error' ? '#FF5807' : '#1547FF');
            t.style.transform = 'translateY(0)';
            setTimeout(() => t.style.transform = 'translateY(150%)', 4000);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!document.getElementById('modal-contrato').hidden) closeContratoModal();
                if (!document.getElementById('modal-parcela').hidden) closeParcelaModal();
                if (!document.getElementById('modal-aditivo').hidden) closeAditivoModal();
            }
        });
    </script>
